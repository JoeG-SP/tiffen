name: tiffen
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"
  bundleIdPrefix: com.tiffen

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ENABLE_OBJC_ARC: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO

targets:
  TiffenCore:
    type: framework
    platform: macOS
    sources:
      - path: src
        excludes:
          - "**/*.metal"
        headerVisibility: public
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tiffen.core
        DEFINES_MODULE: YES
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/src"
          - /opt/homebrew/include
        LIBRARY_SEARCH_PATHS:
          - /opt/homebrew/lib
        OTHER_LDFLAGS:
          - "-ltiff"
          - "-lz"
        MTL_HEADER_SEARCH_PATHS: "$(SRCROOT)/src/Shaders"
        METAL_LIBRARY_OUTPUT_DIR: "$(BUILT_PRODUCTS_DIR)/TiffenCore.framework/Resources"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "TIFFEN_VERSION=\\\"0.1.0\\\""
        GENERATE_INFOPLIST_FILE: YES
    dependencies: []
    preBuildScripts:
      - name: Compile Metal Shaders
        script: |
          set -e
          METAL_SOURCE="${SRCROOT}/src/Shaders/normalize.metal"
          METALLIB_DIR="${BUILT_PRODUCTS_DIR}/TiffenCore.framework/Resources"
          mkdir -p "$METALLIB_DIR"
          if [ -f "$METAL_SOURCE" ]; then
            xcrun metal -c "$METAL_SOURCE" -o "${DERIVED_FILE_DIR}/normalize.air"
            xcrun metallib "${DERIVED_FILE_DIR}/normalize.air" -o "${METALLIB_DIR}/default.metallib"
          fi
        inputFiles:
          - $(SRCROOT)/src/Shaders/normalize.metal
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/TiffenCore.framework/Resources/default.metallib

  tiffen:
    type: tool
    platform: macOS
    sources:
      - path: cli
    settings:
      base:
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/src"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "TIFFEN_VERSION=\\\"0.1.0\\\""
    dependencies:
      - target: TiffenCore
        embed: true

  tiffenApp:
    type: application
    platform: macOS
    sources:
      - path: app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tiffen.app
        PRODUCT_NAME: Tiffen
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/src"
          - "$(SRCROOT)/app"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMainNibFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        GCC_PREPROCESSOR_DEFINITIONS:
          - "TIFFEN_VERSION=\\\"0.1.0\\\""
    dependencies:
      - target: TiffenCore
        embed: true

  tiffenTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tests
    settings:
      base:
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/src"
          - "$(SRCROOT)/app"
          - /opt/homebrew/include
        LIBRARY_SEARCH_PATHS:
          - /opt/homebrew/lib
        OTHER_LDFLAGS:
          - "-ltiff"
          - "-lz"
        GENERATE_INFOPLIST_FILE: YES
        GCC_PREPROCESSOR_DEFINITIONS:
          - "TIFFEN_VERSION=\\\"0.1.0\\\""
    dependencies:
      - target: TiffenCore
        embed: false
